# Conventional Commits enforcement for bqemulator.
# Docs: https://commitlint.js.org/reference/configuration.html

extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
  scope-enum:
    - 1
    - always
    - - sql
      - catalog
      - storage
      - jobs
      - streaming
      - udf
      - scripting
      - versioning
      - types
      - rest
      - grpc
      - api
      - cli
      - config
      - observability
      - testing
      - docs
      - ci
      - build
      - deps
      - release
      - security
      - rfc
      - adr
      - examples
  subject-case:
    - 2
    - never
    - - upper-case
      - pascal-case
      - start-case
  subject-full-stop:
    - 2
    - never
    - "."
  header-max-length:
    - 2
    - always
    - 100
  body-max-line-length:
    - 1
    - always
    - 100
