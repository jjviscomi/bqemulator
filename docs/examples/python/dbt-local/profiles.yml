bqemulator_dbt_local:
  target: emulator
  outputs:
    emulator:
      type: bigquery
      # dbt-bigquery 1.9+ resolves credentials before honouring
      # BIGQUERY_EMULATOR_HOST. The ``oauth`` method calls
      # ``google.auth.default()`` and fails fast when there is no
      # ADC. ``service-account`` accepts a keyfile that we
      # synthesise at run-time in run.sh — that keeps the auth path
      # happy while the env var redirects every actual API call to
      # the emulator.
      method: service-account
      keyfile: "{{ env_var('BQEMU_FAKE_SA_KEY') }}"
      project: "{{ env_var('BQ_PROJECT', 'bqemu-demo') }}"
      dataset: dbt_local
      location: US
      threads: 1
      timeout_seconds: 60
      priority: interactive
