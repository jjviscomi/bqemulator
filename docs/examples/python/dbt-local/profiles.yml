bqemulator_dbt_local:
  target: emulator
  outputs:
    emulator:
      type: bigquery
      # dbt-bigquery 1.9+ runs its credential handshake *before*
      # BIGQUERY_EMULATOR_HOST kicks in. ``oauth`` calls
      # ``google.auth.default()`` and fails without ADC;
      # ``service-account`` eagerly exchanges the keyfile for a
      # real OAuth token against ``oauth2.googleapis.com/token``
      # and fails with ``invalid_grant: account not found`` when
      # the fake SA isn't registered upstream.
      #
      # ``oauth-secrets`` is the one method that never contacts
      # Google: dbt builds a static
      # ``google.oauth2.credentials.Credentials(token=…)`` and
      # uses the literal token in the Authorization header.
      # bqemulator accepts any bearer token, so the static value
      # is fine.
      method: oauth-secrets
      token: bqemu-fake-token
      project: "{{ env_var('BQ_PROJECT', 'bqemu-demo') }}"
      dataset: dbt_local
      location: US
      threads: 1
      timeout_seconds: 60
      priority: interactive
