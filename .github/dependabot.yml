version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      testing:
        patterns:
          - "pytest*"
          - "hypothesis"
          - "testcontainers"
      observability:
        patterns:
          - "opentelemetry-*"
          - "structlog"
          - "prometheus-client"
      tooling:
        patterns:
          - "ruff"
          - "mypy"
          - "bandit"
          - "pip-audit"
          - "interrogate"
    ignore:
      # Apache Airflow 3.x introduces breaking changes to the test
      # runtime (the SDK task-runner reads connections from the
      # metadata DB instead of ``AIRFLOW_CONN_*`` env vars; the
      # airflow-dag-test conftest's ``dag.test()`` driver path needs
      # a significant rework to match). Pin to the 2.x line until
      # that rework lands. Also suppress release-candidate auto-bumps
      # (``-rc.N`` / ``-beta.N`` / ``-alpha.N``) which Dependabot
      # otherwise treats as legitimate updates.
      - dependency-name: "apache-airflow"
        update-types: ["version-update:semver-major"]
      - dependency-name: "apache-airflow-providers-google"
        update-types: ["version-update:semver-major"]
      # Starlette 1.0 switched ``starlette.testclient`` from ``httpx``
      # to ``httpx2`` (``import httpx2 as httpx``), which FastAPI's
      # ``TestClient`` re-exports — so adopting 1.x breaks the entire
      # unit + property test tier until ``httpx2`` ships and FastAPI is
      # on a 1.x-compatible line. The deliberate ``starlette<1.0``
      # ceiling in pyproject.toml holds the line; the related
      # PYSEC-2026-161 advisory is tracked in .pip-audit-ignore for a
      # coordinated FastAPI + Starlette + httpx2 refresh. Suppress the
      # major bump until that lands.
      - dependency-name: "starlette"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
