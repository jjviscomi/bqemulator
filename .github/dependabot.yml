version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      testing:
        patterns:
          - "pytest*"
          - "hypothesis"
          - "testcontainers"
      observability:
        patterns:
          - "opentelemetry-*"
          - "structlog"
          - "prometheus-client"
      tooling:
        patterns:
          - "ruff"
          - "mypy"
          - "bandit"
          - "pip-audit"
          - "interrogate"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
