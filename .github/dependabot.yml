version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      testing:
        patterns:
          - "pytest*"
          - "hypothesis"
          - "testcontainers"
      observability:
        patterns:
          - "opentelemetry-*"
          - "structlog"
          - "prometheus-client"
      tooling:
        patterns:
          - "ruff"
          - "mypy"
          - "bandit"
          - "pip-audit"
          - "interrogate"
    ignore:
      # apache-airflow is not a root dependency; it lives only in the
      # docs/examples/python/airflow-dag-test example, so its version cap
      # belongs in the example ecosystem block below, not here.
      # Starlette 1.x's ``starlette.testclient`` imports ``httpx2``
      # (``import httpx2 as httpx``), which this project does not depend
      # on, so FastAPI's ``TestClient`` (which re-exports it) fails to
      # import with ``ModuleNotFoundError: No module named 'httpx2'`` —
      # taking down the whole unit + property test tier. The deliberate
      # ``starlette<1.0`` ceiling in pyproject.toml holds the line until
      # the project adds an ``httpx2`` dependency and FastAPI is on a
      # 1.x-compatible line; the related PYSEC-2026-161 advisory is
      # tracked in .pip-audit-ignore for that coordinated refresh.
      # Suppress the major bump until then.
      - dependency-name: "starlette"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"

  # ----------------------------------------------------------------------
  # Example + e2e manifests: GROUP security updates; no version updates.
  #
  # The example lock files and e2e client manifests are deliberately
  # pinned snapshots, so Dependabot must not version-update their hundreds
  # of transitively-pinned dependencies. ``open-pull-requests-limit: 0``
  # disables version updates for each block while leaving security updates
  # on (security updates are not counted against that limit).
  #
  # Dependabot security updates fire for vulnerable dependencies in these
  # manifests regardless of this file (they are driven by the dependency
  # graph, not by a version-update ``updates`` block). Without a matching
  # block they arrive ungrouped: one pull request per dependency per
  # directory, so a single shared CVE (e.g. ``cryptography``) fans out into
  # one PR per example. The ``applies-to: security-updates`` group below
  # collapses each wave into one pull request per ecosystem, spanning every
  # affected directory.
  #
  # Go modules (``gomod``) and Maven (``maven``) are covered for the same
  # reason; the scio example uses sbt, which Dependabot does not support,
  # so it is intentionally absent.
  # ----------------------------------------------------------------------
  - package-ecosystem: pip
    directories:
      - "/docs/examples/python/*"
      - "/docs/examples/docker-compose/full-stack/app"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 0
    groups:
      example-pip-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # apache-airflow lives only in the airflow-dag-test example, which is
      # managed by this block, so the cap belongs here. Airflow 3.x breaks
      # the example's test runtime (the SDK task-runner reads connections
      # from the metadata DB instead of ``AIRFLOW_CONN_*`` env vars; the
      # conftest's ``dag.test()`` driver path needs a significant rework),
      # and we will not adopt a release candidate. A
      # ``version-update:semver-major`` ignore is not enough on its own:
      # this is a security-update group (``applies-to: security-updates``),
      # and security updates bypass ``update-types`` ignores. A ``versions``
      # range IS honoured by security updates, so cap by range to hold
      # airflow on the 2.x line (this also covers 3.x pre-releases such as
      # ``3.2.1rc1``) while still letting 2.x security patches through.
      # apache-airflow-providers-google 11.x pairs with airflow 2.x; block
      # its airflow-3-era 12.x line for the same reason.
      - dependency-name: "apache-airflow"
        versions: [">=3.0.0"]
      - dependency-name: "apache-airflow-providers-google"
        versions: [">=12.0.0"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: npm
    directories:
      - "/docs/examples/nodejs/*"
      - "/tests/e2e/nodejs_client"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    groups:
      example-npm-security:
        applies-to: security-updates
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: gomod
    directories:
      - "/docs/examples/go/*"
      - "/tests/e2e/go_client"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    groups:
      example-gomod-security:
        applies-to: security-updates
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: maven
    directories:
      - "/docs/examples/java/spring-boot"
      - "/tests/e2e/java_client"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    groups:
      example-maven-security:
        applies-to: security-updates
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
