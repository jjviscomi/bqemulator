name: Release

on:
  push:
    tags: ["v*.*.*"]

# Token-Permissions least-privilege (OpenSSF Scorecard guidance):
# top-level is read-only; each job below escalates only to the
# writes it actually needs.
permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    # Build is read-only: checkout source, run python -m build, upload
    # artifacts. No writes to the repo / packages / attestations.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/bqemulator
    # PyPI Trusted Publishing requires OIDC token issuance
    # (id-token: write) so the upload can carry a sigstore-verifiable
    # attestation. No other writes needed in this job.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    # GitHub Release creation needs ``contents: write`` (the release
    # upload step). ``id-token: write`` + ``attestations: write`` are
    # for the SLSA Build Provenance attestation step (ADR 0039) added
    # by PR #57; declaring them here keeps the two PRs orthogonal.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      # Generate a SLSA Build Provenance attestation covering every
      # file in ``dist/`` (wheel + sdist). The action signs via
      # sigstore keyless OIDC and stores the bundle on GitHub's
      # native attestations API. The resulting ``.intoto.jsonl``
      # bundle is then attached to the GitHub Release alongside
      # the artifacts so OpenSSF Scorecard's ``Signed-Releases``
      # check sees a signature file at the standard location and
      # marks the release as signed. See
      # [ADR 0039](../../docs/adr/0039-artifact-attestations.md).
      #
      # PyPI gets its own sigstore attestations via Trusted
      # Publishing (``attestations: true`` in the publish-pypi job
      # above) — this attestation is the GitHub-Release-side
      # parallel, so Scorecard's release-asset scan can see it.
      - name: Attest build provenance for dist artifacts
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist/*'
      - name: Stage attestation under a Scorecard-discoverable filename
        # OpenSSF Scorecard's ``Signed-Releases`` check matches release
        # assets by extension: ``*.intoto.jsonl`` / ``*.sigstore`` /
        # ``*.sig``. The action's default ``attestation.json`` output
        # is a valid sigstore bundle (``mediaType:
        # application/vnd.dev.sigstore.bundle.v0.3+json``) but the
        # filename pattern doesn't match. Copy it into ``dist/`` under
        # the canonical name so the upload step picks it up alongside
        # the wheel + sdist and Scorecard credits the release.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp "${{ steps.attest.outputs.bundle-path }}" \
             "dist/bqemulator-${VERSION}.intoto.jsonl"
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/*
