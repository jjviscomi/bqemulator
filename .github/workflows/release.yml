name: Release

on:
  push:
    tags: ["v*.*.*"]

# Token-Permissions least-privilege (OpenSSF Scorecard guidance):
# top-level is read-only; each job below escalates only to the
# writes it actually needs.
permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    # Build is read-only: checkout source, run python -m build, upload
    # artifacts. No writes to the repo / packages / attestations.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/bqemulator
    # PyPI Trusted Publishing requires OIDC token issuance
    # (id-token: write) so the upload can carry a sigstore-verifiable
    # attestation. No other writes needed in this job.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    # GitHub Release creation needs ``contents: write`` (the release
    # upload step). ``id-token: write`` + ``attestations: write`` are
    # for the SLSA Build Provenance attestation step (ADR 0039) added
    # by PR #57; declaring them here keeps the two PRs orthogonal.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      # Generate a SLSA Build Provenance attestation covering every
      # file in ``dist/`` (wheel + sdist). The action signs via
      # sigstore keyless OIDC and stores the bundle on GitHub's
      # native attestations API. The resulting ``.intoto.jsonl``
      # bundle is then attached to the GitHub Release alongside
      # the artifacts so OpenSSF Scorecard's ``Signed-Releases``
      # check sees a signature file at the standard location and
      # marks the release as signed. See
      # [ADR 0039](../../docs/adr/0039-artifact-attestations.md).
      #
      # PyPI gets its own sigstore attestations via Trusted
      # Publishing (``attestations: true`` in the publish-pypi job
      # above) — this attestation is the GitHub-Release-side
      # parallel, so Scorecard's release-asset scan can see it.
      - name: Attest build provenance for dist artifacts
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist/*'
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: |
            dist/*
            ${{ steps.attest.outputs.bundle-path }}
