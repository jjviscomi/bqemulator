name: Examples

# Runs every example project's `make test` on every PR. This workflow
# is intentionally NOT a required check on main — a flaky upstream
# dependency (dbt-core release, Spark, Beam, etc.) should not block
# emulator PRs. See docs/examples/README.md for context.

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/examples/**"
      - ".github/workflows/examples.yml"
      - "Dockerfile"
      - "src/**"
  push:
    branches: [main]
    paths:
      - "docs/examples/**"
      - ".github/workflows/examples.yml"
  schedule:
    - cron: "37 5 * * *"  # nightly full sweep

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  build-image:
    name: Build dev image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.tag.outputs.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - id: tag
        run: echo "image=ghcr.io/jjviscomi/bqemulator:ci-${{ github.sha }}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ steps.tag.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker save ${{ steps.tag.outputs.image }} -o /tmp/bqemu.tar
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bqemu-image
          path: /tmp/bqemu.tar
          retention-days: 1

  example-pytest-integration:
    name: pytest-integration
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.11" }
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
          pip install -r docs/examples/python/pytest-integration/requirements.txt
      - name: make test
        working-directory: docs/examples/python/pytest-integration
        run: make test

  example-dbt-local:
    name: dbt-local
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.11" }
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
          pip install -r docs/examples/python/dbt-local/requirements.txt
      - name: make test
        working-directory: docs/examples/python/dbt-local
        run: make test

  example-airflow-dag-test:
    name: airflow-dag-test
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.11" }
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
          pip install -r docs/examples/python/airflow-dag-test/requirements.txt
      - name: make test
        working-directory: docs/examples/python/airflow-dag-test
        run: make test

  example-pyspark-bigquery:
    name: pyspark-bigquery
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.11" }
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
          pip install -r docs/examples/python/pyspark-bigquery/requirements.txt
      - name: make test
        working-directory: docs/examples/python/pyspark-bigquery
        run: make test

  example-nestjs-app:
    name: nestjs-app
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: bqemu-image, path: /tmp }
      - run: docker load -i /tmp/bqemu.tar
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: make test
        env:
          BQEMU_IMAGE: ${{ needs.build-image.outputs.image }}
        working-directory: docs/examples/nodejs/nestjs-app
        run: make test

  example-cloud-run-local:
    name: cloud-run-local
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: bqemu-image, path: /tmp }
      - run: docker load -i /tmp/bqemu.tar
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20" }
      - name: make test
        env:
          BQEMU_IMAGE: ${{ needs.build-image.outputs.image }}
        working-directory: docs/examples/nodejs/cloud-run-local
        run: make test

  example-spring-boot:
    name: spring-boot
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: bqemu-image, path: /tmp }
      - run: docker load -i /tmp/bqemu.tar
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: make test
        env:
          BQEMU_IMAGE: ${{ needs.build-image.outputs.image }}
        working-directory: docs/examples/java/spring-boot
        run: make test

  example-scio:
    name: scio
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: bqemu-image, path: /tmp }
      - run: docker load -i /tmp/bqemu.tar
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: coursier/setup-action@fd1707a76b027efdfb66ca79318b4d29b72e5a02 # v3.0.0
        with:
          apps: sbt
      - name: make test
        env:
          BQEMU_IMAGE: ${{ needs.build-image.outputs.image }}
        working-directory: docs/examples/java/scio
        run: make test

  example-beam-pipeline:
    name: beam-pipeline
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: bqemu-image, path: /tmp }
      - run: docker load -i /tmp/bqemu.tar
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with: { go-version: "1.25" }
      - name: make test
        env:
          BQEMU_IMAGE: ${{ needs.build-image.outputs.image }}
        working-directory: docs/examples/go/beam-pipeline
        run: make test

  example-dataflow-local:
    name: dataflow-local
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: bqemu-image, path: /tmp }
      - run: docker load -i /tmp/bqemu.tar
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with: { go-version: "1.25" }
      - name: make test
        env:
          BQEMU_IMAGE: ${{ needs.build-image.outputs.image }}
        working-directory: docs/examples/go/dataflow-local
        run: make test

  example-full-stack:
    name: docker-compose full-stack
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: bqemu-image, path: /tmp }
      - run: docker load -i /tmp/bqemu.tar
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.11" }
      - run: pip install google-cloud-bigquery
      - name: make test
        env:
          BQEMU_IMAGE: ${{ needs.build-image.outputs.image }}
        working-directory: docs/examples/docker-compose/full-stack
        run: make test

  example-ci-recipes:
    name: ci-recipes (meta-tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.11" }
      - run: pip install PyYAML
      - name: GitHub Actions recipe
        working-directory: docs/examples/ci-recipes/github-actions
        run: make test
      - name: GitLab CI recipe
        working-directory: docs/examples/ci-recipes/gitlab-ci
        run: make test
      - name: CircleCI recipe
        working-directory: docs/examples/ci-recipes/circleci
        run: make test
