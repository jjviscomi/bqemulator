# OpenSSF Scorecard — public security-posture score.
#
# The Scorecard project evaluates a public repo against ~18 security
# practices (branch protection, pinned deps, SAST coverage, signed
# releases, code-review cadence, …) and publishes the score to the
# OSSF public database at
# https://api.securityscorecards.dev/projects/github.com/jjviscomi/bqemulator
# and the viewer at
# https://scorecard.dev/viewer/?uri=github.com/jjviscomi/bqemulator.
#
# We OPT IN to publication (``publish_results: true``) because:
#  - The project is public anyway, so the score isn't novel info.
#  - The published score lights up the README badge and gives
#    downstream consumers a one-click view of our security posture.
#  - First-class signalling for OSSF tooling (e.g. ``deps.dev``,
#    Open Source Insights, ``allstar``) downstream of the database.
#
# Three triggers feed the database:
#  - ``push: main``      — every change on the default branch
#                          re-scores immediately (catches regressions).
#  - ``release: published`` — re-score on tag-driven releases so the
#                          badge reflects the freshly-published
#                          artefacts (signed wheel + signed image).
#  - ``schedule``        — weekly cron for low-frequency signals
#                          (deps that drifted, vuln database updates).
#  - ``workflow_dispatch`` — manual re-run from the Actions UI.
#
# Third-party action pinning follows the project-wide
# OpenSSF-alignment rule (see AGENTS.md): full commit SHA + trailing
# ``# vX.Y.Z`` comment. First-party ``actions/*`` may use major tags
# (``@v4``). The Dependabot config in
# ``.github/dependabot.yml`` keeps each SHA pin moving forward.

name: OpenSSF Scorecard

# Concurrency policy: cancel superseded ``push: main`` runs (rapid
# commits shouldn't queue stale scores). ``github.event_name`` is in
# the group key so push / release / schedule / workflow_dispatch
# don't cancel each other — a release-triggered re-score must finish
# even if a push-triggered run is in flight, and a manual rescore via
# workflow_dispatch shouldn't kill the weekly cron.
concurrency:
  group: scorecard-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  release:
    types: [published]
  schedule:
    # Weekly, Monday 03:47 UTC (off-hours, off the top-of-hour so we
    # don't compete with the rest of the GHA infra for runners).
    - cron: "47 3 * * 1"
  workflow_dispatch:

# OpenSSF Scorecard's official permissions block (per the action's
# installation guide). Keep these to the minimum the action requires.
permissions: read-all

jobs:
  analysis:
    name: Analyse
    runs-on: ubuntu-latest
    permissions:
      # Required by the Scorecard action to upload SARIF to GitHub's
      # Security tab.
      security-events: write
      # Required for the OIDC sigstore signature on the published
      # results (proves the score was generated by THIS workflow).
      id-token: write
      # Read-only for source checkout + Dependabot scan.
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Scorecard's hardening guidance — drops the default
          # GITHUB_TOKEN from .git/config so the subsequent
          # uncontrolled tools (npm scripts, etc.) can't grab it.
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes the score to the OSSF public database. The repo
          # owner has consented to publication; see ADR 0037 for the
          # full decision context.
          publish_results: true

      # Always keep a copy of the SARIF as an artefact so we can
      # debug score changes locally without trusting GitHub's
      # Security-tab UI.
      - name: Upload SARIF artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
