name: Chaos

# Tier 7 chaos suite — deliberately disrupts the emulator
# (mid-query process kills, file corruption, resource exhaustion,
# clock skew) and asserts it fails safely rather than silently
# corrupting data. See docs/adr/0021-chaos-tier-design-contract.md
# for the design contract.
#
# === Trigger policy: manual only (workflow_dispatch) ===
#
# This workflow is intentionally NOT scheduled and NOT auto-triggered
# on push or pull_request. The gating / cadence decision is deferred
# until after the project's GitHub repo is set up and there is real
# PR traffic to characterise runtime, flakiness, and runner-cost
# trade-offs against. Until then, an operator runs this workflow via
# the GitHub Actions "Run workflow" button (or
# `gh workflow run chaos`).
#
# Candidate future triggers, evaluated post-setup:
#   - per-PR gate (push + pull_request on main) — the suite's per-test
#     `--timeout=60` bounds the worst-case run at ~18 min for the
#     18 tests; aggressive parallelism could halve that
#   - nightly schedule — cheaper per-PR, but bugs ship to main before
#     detection
#   - release-gate-only
#
# Running locally:
#
#     make test-chaos
#
# (equivalent to `pytest tests/chaos -m chaos --timeout=60`)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chaos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chaos:
    name: Chaos tier (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install dev deps
        run: |
          uv sync --frozen --extra dev --extra all --python "3.11"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      - name: Run chaos suite
        run: |
          pytest tests/chaos -m chaos --timeout=60 --junit-xml=chaos-results.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: chaos-results
          path: chaos-results.xml
          if-no-files-found: warn
