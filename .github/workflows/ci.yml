name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests scripts
      - name: Ruff format check
        run: ruff format --check src tests scripts
      - name: Mypy
        run: mypy src
      - name: Bandit
        run: bandit -c pyproject.toml -r src -ll
      - name: pip-audit
        # Honor ``.pip-audit-ignore`` (the same filter ``make lint`` uses
        # locally). Each line that starts with ``PYSEC-`` / ``CVE-`` /
        # ``GHSA-`` becomes a ``--ignore-vuln`` flag — rationale for
        # every advisory ID lives next to the entry in that file.
        run: |
          awk '/^(PYSEC|CVE|GHSA)-/ {printf "--ignore-vuln %s\n", $1}' \
            .pip-audit-ignore | xargs pip-audit
      - name: Interrogate (docstring coverage)
        run: interrogate src
      - name: Typos
        # Pin to a specific commit SHA so the workflow is reproducible
        # and Dependabot can track upgrades. ``@master`` would silently
        # follow the moving branch and could introduce surprise
        # behaviour or supply-chain risk.
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2

  unit:
    name: Unit + property tests (py${{ matrix.python }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
      - name: Unit tests
        run: pytest tests/unit -m unit
      - name: Property tests
        run: pytest tests/property -m property

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
      # G3 / ADR 0030: install avro-tools so the cross-impl Avro
      # integration test ``test_emulator_avro_bytes_decode_with_apache_avro_tools``
      # runs (rather than skipping). The package supplies the
      # ``avro-tools`` jar wrapped in a shell wrapper on PATH.
      - name: Install avro-tools (G3 cross-impl Avro decoder)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends avro-tools || \
            echo "::warning::avro-tools apt package unavailable; the cross-impl test will skip"
      - name: Integration tests
        run: pytest tests/integration -m integration

  conformance:
    name: Conformance corpus (parity with BigQuery)
    runs-on: ubuntu-latest
    needs: [lint]
    # The conformance corpus replays every recorded BigQuery baseline
    # against the in-process emulator. It is the primary
    # parity-with-BigQuery guarantee — a regression here means the
    # emulator no longer behaves like the service it emulates, which
    # is release-blocker by definition. Cost is ~60-100s for ~1190
    # fixtures, comfortably within the per-PR budget. The 13
    # permanent XFAILs are documented design decisions registered in
    # tests/conformance/divergences.py.
    #
    # The ad-hoc dispatchable workflow at
    # .github/workflows/conformance.yml is kept for operator workflows
    # that want to run conformance against a feature branch *before*
    # opening the PR (e.g., right after a recording session), without
    # waiting for the full CI matrix.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
      - name: Replay conformance corpus (offline; no BQ creds)
        run: pytest tests/conformance -m conformance --junit-xml=conformance.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: conformance-results
          path: conformance.xml
          if-no-files-found: warn

  coverage:
    name: Combined U+P+I coverage gate (≥90%)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          # Pin to the dev-environment Python so the gate stays
          # consistent with local ``make verify``. The unit matrix
          # already covers py3.11–3.13; the coverage report itself
          # uses the dev-pinned interpreter so cross-version code-
          # path differences don't move the coverage number.
          python-version: "3.14"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
      - name: Combined coverage (unit + property + integration)
        run: |
          pytest tests/unit tests/property tests/integration \
            --cov=bqemulator --cov-branch \
            --cov-report=xml --cov-report=term \
            --cov-fail-under=90
      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          # v7 removed the singular ``file`` input; ``files`` (a
          # comma-separated list) is the replacement. Without this
          # rename the explicit path is silently dropped — and since
          # ``fail_ci_if_error: false`` the upload failure wouldn't
          # surface in CI.
          files: coverage.xml
          # Don't fail the CI run if the Codecov upload itself
          # fails — the 90% gate is already enforced locally on
          # the runner by ``--cov-fail-under=90``. Codecov is for
          # the dashboard / per-PR diff comment; an upload-side
          # outage shouldn't block merges.
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docs-drift:
    name: Docs-drift gates (coverage-matrix / compat-matrix / function-mapping / api-coverage)
    runs-on: ubuntu-latest
    needs: [lint]
    # Closes the doc-drift class for the four auto-regenerated
    # reference docs:
    #   * docs/reference/conformance-coverage-matrix.md (P8.a)
    #   * docs/reference/compatibility-matrix.md          (P4.b)
    #   * docs/reference/sql-function-mapping.md          (P4.b)
    #   * docs/reference/api-coverage.md                  (v1.0 prep)
    # Each generator has a ``--check`` mode that diffs the committed
    # copy against the live regeneration and exits non-zero on drift.
    # When this gate fails, the remediation is always the same:
    # ``make matrix && make coverage-matrix && make function-mapping
    # && make api-coverage``, then commit the regenerated files.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
      - name: Coverage matrix (P8.a)
        run: python scripts/generate_coverage_matrix.py --check
      - name: Compatibility matrix (P4.b)
        run: python scripts/generate_compatibility_matrix.py --check
      - name: Function mapping (P4.b)
        run: python scripts/generate_function_mapping.py --check
      - name: API coverage (v1.0 prep)
        run: python scripts/generate_api_coverage.py --check
