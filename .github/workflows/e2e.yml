name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"  # nightly full matrix

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  docker-build:
    name: Build container (linux/amd64)
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ghcr.io/jjviscomi/bqemulator:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Export image tarball
        run: docker save ghcr.io/jjviscomi/bqemulator:ci-${{ github.sha }} -o /tmp/bqemu.tar
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bqemu-image
          path: /tmp/bqemu.tar
          retention-days: 1

  python-e2e:
    name: E2E — Python client
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bqemu-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/bqemu.tar
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
      - name: Run
        env:
          BQEMU_IMAGE: ghcr.io/jjviscomi/bqemulator:ci-${{ github.sha }}
        run: pytest tests/e2e/python_client -m e2e

  nodejs-e2e:
    name: E2E — Node.js client
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/e2e/nodejs_client/package-lock.json
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install fixture-staging deps
        run: pip install fastavro pyorc
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bqemu-image
          path: /tmp
      - run: docker load -i /tmp/bqemu.tar
      - name: Stage G1 fixtures + start emulator container
        env:
          BQEMU_IMAGE: ghcr.io/jjviscomi/bqemulator:ci-${{ github.sha }}
        run: |
          # Mirror the Makefile recipe — stage canonical Avro/ORC
          # fixtures into a host dir, then bind-mount it as the
          # container's GCS local root so the G1 ``gs://`` URIs
          # resolve. Without this, the load/extract Avro+ORC tests
          # fail with ``Cannot resolve gs:// URIs without
          # BQEMU_GCS_LOCAL_ROOT configured``.
          GCS_DIR="$(mktemp -d -t bqemu-g1-nodejs.XXXXXX)"
          chmod 777 "$GCS_DIR"
          echo "GCS_DIR=$GCS_DIR" >> "$GITHUB_ENV"
          python scripts/stage_g1_e2e_fixtures.py --root "$GCS_DIR"
          docker run -d --name bqemu \
            -p 9050:9050 -p 9060:9060 \
            -v "$GCS_DIR:/var/lib/bqemu-gcs:rw" \
            -e BQEMU_REST_HOST=0.0.0.0 \
            -e BQEMU_GRPC_HOST=0.0.0.0 \
            -e BQEMU_REST_PORT=9050 \
            -e BQEMU_GRPC_PORT=9060 \
            -e BQEMU_ADMIN_ENABLED=1 \
            -e BQEMU_GCS_LOCAL_ROOT=/var/lib/bqemu-gcs \
            "$BQEMU_IMAGE"
          # Wait up to 60s for /healthz to respond.
          for _ in $(seq 1 120); do
            if curl -sf http://localhost:9050/healthz > /dev/null; then exit 0; fi
            sleep 0.5
          done
          echo "::error::bqemulator did not become ready in 60s"
          docker logs bqemu || true
          exit 1
      - name: Install + test
        env:
          BQEMU_REST_URL: http://localhost:9050
          BQEMU_GRPC_ENDPOINT: localhost:9060
        run: |
          cd tests/e2e/nodejs_client
          npm ci
          npm test
      - name: Container logs (on failure)
        if: failure()
        run: docker logs bqemu || true
      - name: Stop container
        if: always()
        run: docker rm -f bqemu || true

  go-e2e:
    name: E2E — Go client
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Match the go.mod toolchain (go 1.25 / toolchain go1.25.10).
          # setup-go v6 defaults GOTOOLCHAIN=local, so the installed Go
          # must already satisfy the go.mod requirement — a stale 1.22
          # pin no longer auto-downloads the newer toolchain.
          go-version: "1.25"
          cache: true
          cache-dependency-path: tests/e2e/go_client/go.mod
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install fixture-staging deps
        run: pip install fastavro pyorc
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bqemu-image
          path: /tmp
      - run: docker load -i /tmp/bqemu.tar
      - name: Stage G1 fixtures + start emulator container
        env:
          BQEMU_IMAGE: ghcr.io/jjviscomi/bqemulator:ci-${{ github.sha }}
        run: |
          GCS_DIR="$(mktemp -d -t bqemu-g1-go.XXXXXX)"
          chmod 777 "$GCS_DIR"
          echo "GCS_DIR=$GCS_DIR" >> "$GITHUB_ENV"
          python scripts/stage_g1_e2e_fixtures.py --root "$GCS_DIR"
          docker run -d --name bqemu \
            -p 9050:9050 -p 9060:9060 \
            -v "$GCS_DIR:/var/lib/bqemu-gcs:rw" \
            -e BQEMU_REST_HOST=0.0.0.0 \
            -e BQEMU_GRPC_HOST=0.0.0.0 \
            -e BQEMU_REST_PORT=9050 \
            -e BQEMU_GRPC_PORT=9060 \
            -e BQEMU_ADMIN_ENABLED=1 \
            -e BQEMU_GCS_LOCAL_ROOT=/var/lib/bqemu-gcs \
            "$BQEMU_IMAGE"
          for _ in $(seq 1 120); do
            if curl -sf http://localhost:9050/healthz > /dev/null; then exit 0; fi
            sleep 0.5
          done
          echo "::error::bqemulator did not become ready in 60s"
          docker logs bqemu || true
          exit 1
      - name: Test
        env:
          BQEMU_REST_URL: http://localhost:9050
          BQEMU_GRPC_ENDPOINT: localhost:9060
        run: |
          cd tests/e2e/go_client
          go test ./... -count=1
      - name: Container logs (on failure)
        if: failure()
        run: docker logs bqemu || true
      - name: Stop container
        if: always()
        run: docker rm -f bqemu || true

  java-e2e:
    name: E2E — Java client
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install fixture-staging deps
        run: pip install fastavro pyorc
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bqemu-image
          path: /tmp
      - run: docker load -i /tmp/bqemu.tar
      - name: Stage G1 fixtures + start emulator container
        env:
          BQEMU_IMAGE: ghcr.io/jjviscomi/bqemulator:ci-${{ github.sha }}
        run: |
          GCS_DIR="$(mktemp -d -t bqemu-g1-java.XXXXXX)"
          chmod 777 "$GCS_DIR"
          echo "GCS_DIR=$GCS_DIR" >> "$GITHUB_ENV"
          python scripts/stage_g1_e2e_fixtures.py --root "$GCS_DIR"
          docker run -d --name bqemu \
            -p 9050:9050 -p 9060:9060 \
            -v "$GCS_DIR:/var/lib/bqemu-gcs:rw" \
            -e BQEMU_REST_HOST=0.0.0.0 \
            -e BQEMU_GRPC_HOST=0.0.0.0 \
            -e BQEMU_REST_PORT=9050 \
            -e BQEMU_GRPC_PORT=9060 \
            -e BQEMU_ADMIN_ENABLED=1 \
            -e BQEMU_GCS_LOCAL_ROOT=/var/lib/bqemu-gcs \
            "$BQEMU_IMAGE"
          for _ in $(seq 1 120); do
            if curl -sf http://localhost:9050/healthz > /dev/null; then exit 0; fi
            sleep 0.5
          done
          echo "::error::bqemulator did not become ready in 60s"
          docker logs bqemu || true
          exit 1
      - name: Test
        env:
          BQEMU_REST_URL: http://localhost:9050
          BQEMU_GRPC_ENDPOINT: localhost:9060
        run: |
          cd tests/e2e/java_client
          mvn -B test
      - name: Container logs (on failure)
        if: failure()
        run: docker logs bqemu || true
      - name: Stop container
        if: always()
        run: docker rm -f bqemu || true

  bq-cli-e2e:
    # G5 (2026-05-21) — fifth conformance client: Google's ``bq`` CLI.
    # Uses testcontainers (same lifecycle as the Python suite) since
    # bq is a Python subprocess we drive from pytest, not a separate
    # toolchain that needs its own container. The google-cloud-cli
    # install step adds ~30s to job setup but is non-optional: a missing
    # ``bq`` binary would skip the whole suite at pytest collection
    # time, masking a regression silently.
    name: E2E — bq CLI
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bqemu-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/bqemu.tar
      - name: Install google-cloud-cli
        # https://cloud.google.com/sdk/docs/install#deb — installs
        # ``bq`` (BigQuery CLI 2.x) which is part of the google-cloud-cli
        # package on Debian/Ubuntu.
        run: |
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" \
            | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          sudo apt-get update -y
          sudo apt-get install -y google-cloud-cli
          bq version
      - name: Install bqemulator (Python + testcontainers)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
      - name: Run
        env:
          BQEMU_IMAGE: ghcr.io/jjviscomi/bqemulator:ci-${{ github.sha }}
        run: pytest tests/e2e/bq_cli_client -m e2e
