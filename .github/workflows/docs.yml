name: Docs

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/bqemulator/**/*.py"  # mkdocstrings pulls from source
      - ".github/workflows/docs.yml"

# Cancel an in-flight docs build when a newer commit lands on the same
# ref. Branch pushes to ``main`` can otherwise race and produce a
# stale ``gh-pages`` deploy via ``mike``; tag builds (which deploy the
# tagged version + flip the ``stable`` alias) are inherently
# single-shot so the cancellation only fires on the ``main`` branch
# case in practice.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

# Token-Permissions least-privilege (OpenSSF Scorecard guidance):
# top-level is read-only; the ``deploy`` job below escalates to
# ``contents: write`` only when it actually needs to push to the
# ``gh-pages`` branch via ``mike``. The ``build`` job (which runs on
# every PR) stays read-only.
permissions:
  contents: read

jobs:
  build:
    name: Build + strict check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Build strict
        run: mkdocs build --strict

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    # Only the deploy job needs write — mike pushes to the
    # ``gh-pages`` branch via git push.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Deploy latest (main)
        if: github.ref == 'refs/heads/main'
        run: |
          mike deploy --push --update-aliases main latest
          # Pin the root URL's redirect target. Without this,
          # https://jjviscomi.github.io/bqemulator/ returns 404
          # because ``mike`` only configures per-version
          # subdirectories and no default. Pre-v1.0.0 the bare
          # URL points at ``latest`` (= ``main``); the
          # tag-deploy step below flips the default to
          # ``stable`` when v1.0.0 ships.
          mike set-default --push latest
      - name: Deploy tagged version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mike deploy --push --update-aliases "$VERSION" stable
          mike set-default --push stable
