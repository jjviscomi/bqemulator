# ---------------------------------------------------------------------------
# Capped-by-upstream starlette advisory
# ---------------------------------------------------------------------------
#
# Apache Airflow 3.x caps starlette at ``<1`` (currently resolves to
# 0.52.1 in the airflow-dag-test example). PYSEC-2026-161's fix lives
# in starlette 1.0.1, but airflow's constraint blocks the upgrade until
# Airflow widens its starlette range. The example does not expose the
# affected starlette endpoints; the demo DAG only exercises the
# BigQuery operator path.

# Note: PYSEC-2026-161 (starlette<1 cap on airflow 3.x) was relevant
# under the airflow 3.x experiment. The example now stays on 2.x
# (see entries below) so starlette doesn't enter the closure.

# ---------------------------------------------------------------------------
# apache-airflow 2.x CVEs with fix only in 3.x line
# ---------------------------------------------------------------------------
#
# The ``airflow-dag-test`` example stays on apache-airflow 2.x because
# airflow 3.x introduced breaking changes to the test runtime (the SDK
# task-runner reads connections from the metadata DB instead of
# ``AIRFLOW_CONN_*`` env vars; the conftest's ``dag.test()`` driver
# path needs a significant rework to match).
#
# These advisories have no patch in the airflow 2.x line — every fix
# version is in 3.x. The example is a demo DAG with no production
# exposure; the affected code paths are auth surfaces / scheduler
# internals not exercised by the demo's BigQuery operator chain.
#
# Re-evaluate when the conftest is reworked for airflow 3.x.

