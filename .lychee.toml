# lychee link-checker config
# ---------------------------------------------------------------------------
#
# Wired into ``.github/workflows/linkcheck.yml`` (PR + nightly). The
# goal is to catch the class of breakage we hit during the v1.0.1
# audit: doc-site URLs missing the ``/latest/`` prefix, github.com
# blob/tree links pointing at moved files, third-party URLs that have
# 404'd since the doc was written.
#
# We INTENTIONALLY do not validate fragment anchors (#section) by
# default — mkdocs' generated anchors are slugified, lychee's
# fragment-check trips on minor case/punctuation differences from
# the source heading.

# ---------------------------------------------------------------------------
# Scope
# ---------------------------------------------------------------------------

# Default check timeout per URL.
timeout = 20

# Don't follow more than 20 redirects (catches infinite-loop CDNs).
# Bumped from 5 → 10 → 15 → 20 to absorb Google Cloud docs' CDN/locale
# redirect chain (``cloud.google.com → docs.cloud.google.com →
# locale-prefixed → canonical``) which keeps growing with their
# CDN topology. PR #101 (2026-05-28) bumped 10 → 15 to clear PR #100's
# failures; PR #110 (2026-05-30) bumped 15 → 20 after the pre-v1.1.2
# audit CI hit ``[302] Rejected status code: ... Redirects may have
# been limited by "max-redirects"`` on two GCP docs URLs
# (``information-schema-columns``, ``standard-sql/transactions``)
# referenced from ``docs/reference/conformance-coverage-matrix.md``.
# Same URLs resolve fine in a browser — the hop count from the runner
# egress region is the variable. 20 absorbs the latest observed chain
# with headroom; infinite-loop CDNs cap out much higher (40+) so we
# still catch the pathological cases.
max_redirects = 20

# Retry failed URLs on transient errors. Calibrated against the
# v1.0.2 release CI cycle (PR #43, 2026-05-23) where lychee hit
# repeated ``502 Bad Gateway`` from ``github.com/.../blob/main/...``
# source-tree pages — GitHub.com itself briefly choking on existing
# files. Two retries with a 3-second wait covered ~6 seconds total;
# the 502 window outlasted that. Four retries × 10s give a ~40-second
# total budget per failing URL, which absorbs the typical 30-60s
# blob-render transient without masking real outages (the alternative
# of adding ``502`` to the ``accept`` list was rejected — a renamed
# repo would 502 persistently and we want to know).
max_retries = 4
retry_wait_time = 10

# Run requests in parallel (default is fast enough; capping at 16
# avoids tripping rate limits on github.com).
max_concurrency = 16

# Treat unrecognised schemes (mailto:, irc:, javascript:) as ok —
# we don't need to validate them.
include_mail = false

# ---------------------------------------------------------------------------
# URL remapping — resolve repo-self-references as local files
# ---------------------------------------------------------------------------
#
# Generated docs (the coverage-matrix, the compatibility-matrix, function-
# mapping, api-coverage, etc.) emit absolute github.com URLs for every
# repo-internal file reference (e.g.,
# ``[tpcds_q12](https://github.com/jjviscomi/bqemulator/blob/main/tests/
# conformance/sql_corpus/standard_functions/tpcds_q12)``). Absolute URLs
# are necessary for the rendered mkdocs site, where pages live at
# different URL prefixes than the source tree and relative paths would
# resolve to 404s. But they create a per-PR linkcheck failure mode:
#
# 1. A PR adds new files (e.g., a new conformance fixture directory).
# 2. The generated doc rewrites to include
#    ``github.com/.../blob/main/.../new_file``.
# 3. lychee on the PR branch fetches the URL.
# 4. GitHub returns 404 because the new file is on the PR branch, not
#    on ``main``.
# 5. lychee fails the build — even though the link is correct in the
#    eventual-merge state.
#
# An orthogonal failure mode: github.com 502 transients on
# ``blob/main`` URLs that re-fetch fine seconds later (observed during
# the v1.1.0 cascade — PRs #57 / #58 / #60 all hit this).
#
# Fix: invoke lychee with a ``--remap`` argument that rewrites
# ``github.com/jjviscomi/bqemulator/{blob,tree}/main/<path>`` URLs to
# ``file://<absolute-repo-root>/<path>`` at check time. lychee then
# resolves against the PR branch's filesystem, not a stale main
# fetch. The remap lives in:
#
# * ``.github/workflows/linkcheck.yml`` — uses ``${{ github.workspace }}``
# * ``Makefile`` ``linkcheck`` target — uses ``$$PWD``
#
# It can't live in this config file because lychee's ``remap`` expects
# valid URLs, not relative paths or ``$PWD``-style env expansion, and
# the absolute repo-root path differs between CI runners and local
# checkouts. CLI-side remap with a templated workspace path is
# portable; config-side ``remap`` is not.
#
# Behavioural envelope vs. pre-fix:
#
# * PR-branch new files: now pass instead of 404 (correct).
# * github.com 502 transients on self-links: now no-op (correct).
# * Renamed/deleted files: still caught (lychee reports "file not
#   found" against the local checkout — same signal as the 404 was).
# * Typos in the URL itself (``blob/maine/``, wrong-branch refs):
#   would fail under the old behaviour (404) AND under the new
#   behaviour (file not found locally) — both because the literal
#   ``main`` pattern doesn't match. No coverage lost.
#
# The mkdocs-served public site keeps fetching the absolute github
# URLs at render time — ``--remap`` is a lychee-only directive.

# ---------------------------------------------------------------------------
# Status codes
# ---------------------------------------------------------------------------

# Codes that are NOT treated as broken even though they aren't 2xx:
# - 401/403/429: behind auth or rate-limited; can't tell from CI
# - 999: LinkedIn's anti-scraping response (used by many docs links)
accept = ["200..=299", "401", "403", "429", "999"]

# ---------------------------------------------------------------------------
# Excludes
# ---------------------------------------------------------------------------

# Directories whose markdown we never check:
# - .dev/ is gitignored and internal
# - node_modules + .venv + target are vendored build trees
# - tests/conformance has internal test corpus
# - fuzz/corpus is fuzz harness input
exclude_path = [
    ".dev/",
    "node_modules/",
    ".venv/",
    "target/",
    "site/",
    "htmlcov/",
    "build/",
    ".pytest_cache/",
    "fuzz/corpus/",
    "tests/conformance/",
    "tests/perf/",
    "tests/fixtures/",
    "docs/examples/nodejs/cloud-run-local/package-lock.json",
    "docs/examples/nodejs/nestjs-app/package-lock.json",
]

# URL patterns that we know to be flaky / not worth checking:
# - localhost / 127.0.0.1 / 0.0.0.0 — only valid at runtime, never
#   from a CI runner
# - shields.io — sometimes 503s; cached badges still work in
#   practice
# - github.com/.../actions/.../badge.svg — same as shields.io
# - cloud.google.com/secret/* — gated, returns 404 to non-members
# - oauth2.googleapis.com — auth endpoint, not browsable
exclude = [
    # Loopback / template URLs
    "^https?://(localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0)(:|/|$)",
    "^https?://(host|REST_URL|GRPC_ENDPOINT|YOUR_PROJECT|<.*>|\\$\\{.*\\}|x\\.example|emulator|bqemulator)(:[0-9]+)?(/|$)",
    # Anchor-only links inside the same doc (lychee already
    # handles these well, this is defence in depth).
    "^#",
    # Shields.io / GitHub Actions badges — flaky in CI but render
    # correctly in practice; we already verify their JSON output
    # at release time.
    "^https://img\\.shields\\.io/",
    "^https://github\\.com/[^/]+/[^/]+/actions/workflows/.*\\.svg$",
    # mike-deployed docs — anything in the ``/bqemulator/<version>/``
    # tree is only available AFTER the docs deploy step lands; PRs
    # that update doc paths reach lychee before the deploy fires,
    # producing a phantom failure. The v1.0.1 audit lives in source
    # control (every URL was hand-checked at audit time + the
    # category-1 sweep guarantees the prefix), so skipping these on
    # CI avoids the false positive. The release workflow re-runs
    # lychee against the published site.
    "^https://jjviscomi\\.github\\.io/bqemulator/",
    # Community-docs hosts that recurringly return ``Connection
    # failed`` / ``Connection reset by peer`` from GitHub Actions
    # runner egress even after the 4 × 10s retry budget. The same
    # URLs resolve cleanly from local dev runs and from end users'
    # browsers — the pattern looks like rate-limiting or IP-range
    # filtering against the runner pool. Each host below has caused
    # at least one PR to fail its required ``Verify links`` gate.
    # The ``api.securityscorecards.dev`` endpoint is exercised
    # implicitly when ``.github/workflows/scorecard.yml`` publishes
    # to it via ``ossf/scorecard-action`` (a publish failure would
    # show up as a workflow failure on every push to main); the
    # ``scorecard.dev`` viewer is a static UI page over the same
    # data — excluding it only skips lychee's GET of the HTML.
    "^https://(api\\.securityscorecards|scorecard)\\.dev/",
    "^https://www\\.conventionalcommits\\.org/",
    "^https://www\\.contributor-covenant\\.org/",
    # Email / messaging schemes
    "^mailto:",
]
