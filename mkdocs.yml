site_name: bqemulator
site_description: Local emulator for Google BigQuery
site_url: https://jjviscomi.github.io/bqemulator/
repo_url: https://github.com/jjviscomi/bqemulator
repo_name: jjviscomi/bqemulator
edit_uri: edit/main/docs/
copyright: Apache 2.0

# Exclude developer-only artefacts that may transiently exist under
# ``docs/`` after running example workflows locally. ``make verify``
# runs ``test-e2e-nodejs`` (which ``npm install``s into the example
# project) before ``docs-build``; mkdocs strict mode would otherwise
# treat every dependency's ``README.md`` as a docs file and abort on
# the dependency's broken intra-package anchors. CI is hermetic so
# this only bites local verify runs, but the exclusion is harmless
# in CI too.
exclude_docs: |
  examples/nodejs/*/node_modules/
  examples/**/target/
  examples/**/build/
  examples/**/.venv/
  examples/**/__pycache__/

theme:
  name: material
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  version:
    provider: mike
    default: latest

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            members_order: source
            show_source: true
            show_signature_annotations: true
            show_root_heading: true
            separate_signature: true
            line_length: 88

