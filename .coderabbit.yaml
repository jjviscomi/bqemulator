# CodeRabbit configuration — https://docs.coderabbit.ai/guides/configure-coderabbit
#
# bqemulator is an OSS project on the CodeRabbit Free plan. The config
# tunes auto-review behaviour for the project's specific layout:
#
#   * Vendored client deps (node_modules, target, vendor) under
#     ``tests/e2e/`` are huge and add nothing to review value.
#   * Conformance corpus fixtures (``tests/conformance/sql_corpus/`` etc.)
#     are recorded against real BigQuery and re-validated by the conformance
#     gate — reviewing each row-by-row would be noise.
#   * ADRs in ``docs/adr/`` are immutable history; reviewing them later
#     is not useful.
#   * Auto-generated reference docs (``sql-function-mapping.md``,
#     ``conformance-coverage-matrix.md``) are regenerated by scripts and
#     gated by ``make verify`` — reviewing the diff is duplicative.
#
# See https://docs.coderabbit.ai/reference/configuration for schema docs.

language: en-US

tone_instructions: |
  Be terse and pragmatic. The project biases toward production-shape
  feedback over style nitpicks: surface real bugs, security issues,
  missing test coverage, and ADR-worthy architectural drift. Skip
  comments about code style that ``ruff`` or ``mypy --strict`` would
  catch — those gates run in CI.

early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - "main"
    # Skip auto-review on Dependabot dependency-bump PRs — those are
    # mechanical and reviewing them adds noise. We still get the
    # summary comment but no inline review chatter.
    ignore_title_keywords:
      - "chore(deps)"
      - "chore(ci): Bump"

  # Paths to exclude from review. ``!`` prefix means "do not review".
  path_filters:
    - "!tests/e2e/*/node_modules/**"
    - "!tests/e2e/*/target/**"
    - "!tests/e2e/*/vendor/**"
    - "!tests/e2e/*/package-lock.json"
    - "!tests/e2e/*/go.sum"
    - "!docs/examples/*/node_modules/**"
    - "!docs/examples/*/target/**"
    - "!docs/examples/*/vendor/**"
    - "!docs/examples/*/*.lock"
    - "!docs/examples/*/package-lock.json"
    - "!tests/conformance/sql_corpus/**"
    - "!tests/conformance/http_corpus/**"
    - "!tests/conformance/grpc_corpus/**"
    - "!docs/adr/**"
    - "!docs/reference/sql-function-mapping.md"
    - "!docs/reference/conformance-coverage-matrix.md"
    - "!**/*.svg"
    - "!**/*.proto"
    - "!**/generated/**"

  # Path-scoped review instructions. CodeRabbit applies these in
  # addition to its built-in knowledge of the language / framework.
  path_instructions:
    - path: "src/bqemulator/**"
      instructions: |
        Apply the project's non-negotiable principles from AGENTS.md:
        hexagonal architecture, ≥90% line + branch coverage, strict
        typing, pattern-driven (Strategy / Command / Repository /
        Visitor / Interpreter). Flag any new public API surface that
        lacks an ADR under ``docs/adr/`` or a guide under
        ``docs/guides/``. Flag any new SQL rule or rewriter that
        lacks a corresponding conformance fixture.
    - path: "tests/**"
      instructions: |
        Integration tests must NOT mock DuckDB — they exercise the real
        engine via testcontainers or the in-process server. Flag any
        new ``Mock(...)`` against ``DuckDBEngine`` or
        ``DuckDBPyConnection``. Unit tests may mock freely.
    - path: ".github/workflows/**"
      instructions: |
        Verify ``concurrency: cancel-in-progress`` is set on push-
        triggered workflows. Flag steps that don't pin action versions
        with a major-version tag.
    - path: "docs/**"
      instructions: |
        Flag any reintroduction of the "Phase N" scaffolding pattern
        — those references were cleaned up before v1.0 in favour of
        subsystem labels. Verify the change won't break
        ``mkdocs build --strict``.

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
